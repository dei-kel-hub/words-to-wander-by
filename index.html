<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Words to Wander By</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <canvas id="stars"></canvas>
    <div id="container">

      <h1>🌙 Words to Wander By 🌙</h1>

      <div id="quote-card">
        <p id="quote-text">Click the button to get a quote!</p>
        <p id="quote-author"></p>
      </div>

      <div id="buttons">
  <button id="new-quote-btn">New Quote</button>
  <button id="fav-btn">🤍 Save</button>
  <button id="copy-btn"> Copy</button>
  <a id="tweet-btn" href="#" target="_blank">Share on X</a>
</div>

<div id="favourites-section" class="hidden">
  <h2>✨ Saved Quotes</h2>
  <ul id="favourites-list"></ul>
  <button id="clear-favs-btn">Clear all</button>
</div>

    </div>
    <script src="script.js"></script>
  </body>
</html>
